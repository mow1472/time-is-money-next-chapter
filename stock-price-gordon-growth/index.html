<!-- EYARC-styled graphic — Gordon growth stock price worked equation -->
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --navy:#002E5D; --blue:#0d65c7; --lightblue:#B5E2FA;
    --yellow:#FFE600; --gold:#F2BA05;
    --gray1:#EAEAF1; --gray2:#C2C2CE; --gray3:#747480;
    --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans:'Open Sans', Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:var(--sans); background:#F2F3F7;
    display:flex; justify-content:center; padding:40px 24px; min-height:100vh; }
  .wrap{ width:100%; max-width:780px; }
  .frame{ border:1px solid #000; border-radius:14px; overflow:hidden; background:var(--navy);
    box-shadow:0 18px 40px -18px rgba(0,46,93,.55); }
  .bar{ padding:16px 22px; background:var(--navy); border-bottom:3px solid var(--yellow);
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .bar h1{ font-weight:800; font-size:16px; letter-spacing:.3px; color:#fff; }
  .bar .step{ font-family:var(--mono); font-size:11px; font-weight:700; color:var(--navy);
    background:var(--yellow); padding:5px 11px; border-radius:6px; white-space:nowrap; }

  .screen{ position:relative; background:var(--navy); padding:24px 24px 26px; }
  .screen::after{ content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 3px);
    pointer-events:none; }
  .eqlabel{ font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color:var(--gray2); margin-bottom:15px; }
  .eqgrid{ display:inline-grid; grid-template-columns:auto 1fr; gap:8px 10px; align-items:baseline;
    font-family:var(--mono); font-size:21px; font-weight:500; color:#fff; }
  .eqgrid .lhs{ text-align:right; color:#fff; }
  .eqgrid .op{ color:var(--gold); font-weight:700; }
  .eqgrid .res{ color:var(--yellow); font-weight:700; }
  .eqsub{ display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;
    font-family:var(--mono); font-size:11.5px; color:var(--lightblue); }
  .eqsub .tag{ background:rgba(181,226,250,.12); padding:2px 8px; border-radius:5px; }
</style>

<div class="wrap">
  <div class="frame">
    <div class="bar">
      <h1>Stock Price &mdash; Gordon Growth</h1>
      <div class="step">P = D&#8321; &divide; (r &minus; g)</div>
    </div>

    <div class="screen">
      <div class="eqlabel">Price the stock</div>
      <div class="eqgrid">
        <div class="lhs">P</div>
        <div><span class="op">=</span> $2.163 <span class="op">&divide;</span> <span class="paren">(</span>0.074 <span class="op">&minus;</span> 0.03<span class="paren">)</span></div>
        <div class="lhs"></div>
        <div><span class="op">=</span> $2.163 <span class="op">&divide;</span> 0.044</div>
        <div class="lhs"></div>
        <div><span class="op">=</span> <span class="res">$49.16</span></div>
      </div>
      <div class="eqsub">
        <span class="tag">D&#8321; = $2.163&nbsp;&middot;&nbsp;next year&rsquo;s dividend</span>
        <span class="tag">r = 7.4%</span>
        <span class="tag">g = 3%</span>
      </div>
    </div>
  </div>
</div>
