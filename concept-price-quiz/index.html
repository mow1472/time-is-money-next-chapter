<!-- EYARC-styled two-part practice — concept selector + price it -->
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --navy:#002E5D; --blue:#0d65c7; --lightblue:#B5E2FA;
    --yellow:#FFE600; --gold:#F2BA05; --green:#6E9600; --red:#F84725;
    --gray1:#EAEAF1; --gray2:#C2C2CE; --gray3:#747480;
    --mono:'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
    --sans:'Open Sans', Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:var(--sans); background:#F2F3F7; color:var(--navy);
    display:flex; justify-content:center; padding:40px 24px; min-height:100vh; }
  .wrap{ width:100%; max-width:780px; }
  .frame{ border:1px solid #000; border-radius:14px; overflow:hidden; background:#fff;
    box-shadow:0 18px 40px -18px rgba(0,46,93,.55); }
  .bar{ padding:18px 24px; background:var(--navy); border-bottom:3px solid var(--yellow);
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .bar h1{ font-weight:800; font-size:17px; color:#fff; letter-spacing:.3px; }
  .meta{ display:flex; align-items:center; gap:14px; }
  .counter{ font-family:var(--mono); font-size:12px; font-weight:700; color:var(--navy);
    background:var(--yellow); padding:5px 12px; border-radius:20px; white-space:nowrap; }
  .dots{ display:flex; gap:7px; }
  .dot{ width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.30); transition:.2s; }
  .dot.solved{ background:var(--green); }
  .dot.current{ box-shadow:0 0 0 3px rgba(255,230,0,.40); background:var(--yellow); }
  .dot.current.solved{ background:var(--green); }

  .body{ padding:8px 24px 22px; }
  .q{ display:none; }
  .q.active{ display:block; animation:pop .32s ease; }
  @keyframes pop{ from{opacity:0; transform:translateY(10px) scale(.99);} to{opacity:1; transform:translateY(0) scale(1);} }
  @keyframes slide{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }

  .phead{ display:flex; gap:12px; align-items:baseline; margin-top:18px; }
  .pnum{ flex:none; padding:0 10px; height:26px; border-radius:7px; background:var(--navy); color:#fff;
    font-weight:800; font-size:11px; display:flex; align-items:center; justify-content:center; transform:translateY(2px); white-space:nowrap; }
  .pnum.done{ background:var(--green); }
  .prompt{ font-size:14.5px; line-height:1.55; }

  .options{ display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
  .opt{ font-family:var(--sans); font-weight:700; font-size:13.5px; color:var(--navy); background:#fff;
    border:1.5px solid var(--gray2); border-radius:10px; padding:10px 22px; cursor:pointer; transition:.15s; }
  .opt:hover{ border-color:var(--navy); }
  .opt.ok{ background:rgba(110,150,0,.12); border-color:var(--green); color:#4e6b07; }
  .opt.bad{ background:rgba(248,71,37,.10); border-color:var(--red); color:#b5350f; }
  .opt.dim{ opacity:.45; }
  .opt.lock{ pointer-events:none; }

  .apanel{ display:none; margin-top:12px; padding:12px 15px; border-radius:10px; font-size:13px; line-height:1.55; }
  .apanel.show{ display:block; animation:slide .25s ease; }
  .apanel.ok{ background:rgba(110,150,0,.10); border-left:4px solid var(--green); }
  .apanel.bad{ background:rgba(248,71,37,.08); border-left:4px solid var(--red); }

  .partb{ display:none; margin-top:20px; padding-top:18px; border-top:1px solid var(--gray1); }
  .partb.show{ display:block; animation:slide .3s ease; }

  .answer{ display:flex; gap:10px; align-items:center; margin-top:14px; flex-wrap:wrap; }
  .answer .pre{ font-weight:700; font-size:13px; color:var(--gray3); }
  .answer input{ font-family:var(--mono); font-size:14px; font-weight:500; color:var(--navy);
    padding:9px 12px; border:1.5px solid var(--gray2); border-radius:8px; width:160px; outline:none; transition:border-color .15s; }
  .answer input:focus{ border-color:var(--blue); }
  .answer input.ok{ border-color:var(--green); background:rgba(110,150,0,.06); }
  .answer input.bad{ border-color:var(--red); background:rgba(248,71,37,.05); }
  button.check{ font-family:var(--sans); font-weight:700; font-size:13px; color:#fff; background:var(--blue);
    border:none; cursor:pointer; padding:9px 18px; border-radius:8px; transition:background .15s, transform .05s; }
  button.check:hover{ background:#0a52a3; } button.check:active{ transform:translateY(1px); }
  .feedback{ font-size:13px; font-weight:700; margin-left:2px; min-height:18px; }
  .feedback.ok{ color:var(--green); } .feedback.bad{ color:var(--red); }

  .panel{ display:none; margin-top:12px; padding:13px 15px; border-radius:10px; font-size:13px; line-height:1.55; }
  .panel.show{ display:block; animation:slide .25s ease; }
  .panel.t1{ background:rgba(181,226,250,.35); border-left:4px solid var(--blue); }
  .panel.t2{ background:rgba(255,230,0,.14); border-left:4px solid var(--gold); }
  .panel.reveal{ background:var(--navy); border-left:4px solid var(--yellow); color:#fff; }
  .panel .tag{ font-weight:800; font-size:11px; letter-spacing:.6px; text-transform:uppercase; display:block; margin-bottom:5px; }
  .panel.t1 .tag{ color:var(--blue); } .panel.t2 .tag{ color:#9a7400; } .panel.reveal .tag{ color:var(--yellow); }
  .panel code{ font-family:var(--mono); font-size:12px; background:rgba(0,46,93,.06); padding:1px 5px; border-radius:4px; }
  .reveal .amt{ font-family:var(--mono); font-weight:700; font-size:22px; color:var(--yellow); }
  .reveal .why{ font-size:12.5px; color:var(--lightblue); margin-top:6px; line-height:1.5; }
  .reveal .excel{ display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .reveal .excel .lab{ font-size:11px; font-weight:700; color:var(--gray2); }
  .reveal .excel code{ background:rgba(255,255,255,.12); color:#fff; }
  .reveal .cbtn{ font-family:var(--sans); font-size:10px; font-weight:700; cursor:pointer; color:var(--navy);
    background:var(--yellow); border:none; padding:4px 9px; border-radius:5px; }
  .reveal .cbtn.done{ background:var(--green); color:#fff; }

  .nextwrap{ display:none; margin-top:16px; }
  .nextwrap.show{ display:block; animation:slide .25s ease; }
  button.next{ font-family:var(--sans); font-weight:800; font-size:13px; color:var(--navy); background:var(--yellow);
    border:none; cursor:pointer; padding:10px 20px; border-radius:8px; transition:background .15s, transform .05s; }
  button.next:hover{ background:var(--gold); } button.next:active{ transform:translateY(1px); }

  #finish{ display:none; text-align:center; padding:34px 20px 26px; }
  #finish.show{ display:block; animation:pop .32s ease; }
  #finish h2{ font-size:22px; font-weight:800; color:var(--navy); }
  #finish .score{ font-family:var(--mono); font-size:40px; font-weight:700; color:var(--green); margin:10px 0 4px; }
  #finish p{ font-size:13px; color:var(--gray3); margin-bottom:18px; }
  button.restart{ font-family:var(--sans); font-weight:700; font-size:13px; color:#fff; background:var(--navy);
    border:none; cursor:pointer; padding:10px 22px; border-radius:8px; }
  button.restart:hover{ background:#013a76; }

  .note{ display:flex; gap:12px; align-items:flex-start; margin-top:22px; padding:14px 16px;
    background:rgba(181,226,250,.30); border-radius:10px; border-top:1px solid var(--gray1); }
  .note .mark{ flex:none; width:26px; height:26px; border-radius:6px; background:var(--yellow); color:var(--navy);
    font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center; margin-top:1px; }
  .note p{ font-size:12.5px; line-height:1.5; }
  .note code{ font-family:var(--mono); font-size:11.5px; background:#fff; border:1px solid var(--gray2); padding:1px 5px; border-radius:4px; }
</style>

<div class="wrap">
  <div class="frame">
    <div class="bar">
      <h1>Concept &rarr; Price &mdash; Practice</h1>
      <div class="meta">
        <div class="dots" id="dots"></div>
        <div class="counter" id="counter">Q1 of 3</div>
      </div>
    </div>
    <div class="body">
      <div id="quiz"></div>
      <div id="finish">
        <h2>Nice work!</h2>
        <div class="score" id="score">0 / 3</div>
        <button class="restart" onclick="restart()">Start over</button>
      </div>
      <div class="note" id="note">
        <div class="mark">!</div>
        <p>First call it without math (coupon vs. YTM), then price it. Answers accept <code>$34,257.82</code>, <code>34,257.82</code>, or <code>34257.82</code> &mdash; dollar sign and commas optional; the price reads positive even though <code>PV</code> shows it negative.</p>
      </div>
    </div>
  </div>
</div>

<script>
  var QUESTIONS = [
    {
      conceptPrompt:"A bond has a 9% coupon. The market&rsquo;s required return (YTM) for bonds like it is 6%. Without calculating &mdash; premium, discount, or par?",
      correct:"premium",
      fb:{
        premium:"<b>Correct.</b> The 9% coupon exceeds the 6% YTM, so the bond pays more than the market requires &mdash; its price climbs above par.",
        discount:"Not quite. A discount happens when coupon &lt; YTM; here it&rsquo;s the reverse.",
        par:"Par requires coupon = YTM, and 9% &ne; 6%."
      },
      pricePrompt:"Now price it. The bond has 10 years to maturity, a 9% annual coupon, and $1,000 par, at a 6% YTM.",
      h1:"You already know it&rsquo;s a premium bond, so expect a price above $1,000. What are your five inputs?",
      h2:"<code>N = 10</code>, <code>I/YR = 6</code>, <code>PMT = 90</code> (9% &times; $1,000), <code>FV = 1,000</code>, solve for <code>PV</code>.",
      why:"About $221 above par &mdash; the premium investors pay for that above-market coupon.",
      excel:"=PV(0.06, 10, 90, 1000)", answer:1220.80
    },
    {
      conceptPrompt:"A bond has a 4% coupon. The market&rsquo;s required return (YTM) for similar bonds is 7%. Without calculating &mdash; premium, discount, or par?",
      correct:"discount",
      fb:{
        discount:"<b>Correct.</b> The 4% coupon is below the 7% YTM, so buyers won&rsquo;t pay full par &mdash; the price falls below $1,000.",
        premium:"Not quite. A premium needs coupon &gt; YTM; here the coupon is lower.",
        par:"Par requires coupon = YTM, and 4% &ne; 7%."
      },
      pricePrompt:"Now price it. The bond has 8 years to maturity, a 4% annual coupon, and $1,000 par, at a 7% YTM.",
      h1:"You know it&rsquo;s a discount bond, so expect a price below $1,000. What are your five inputs?",
      h2:"<code>N = 8</code>, <code>I/YR = 7</code>, <code>PMT = 40</code> (4% &times; $1,000), <code>FV = 1,000</code>, solve for <code>PV</code>.",
      why:"About $179 below par &mdash; the discount that makes a 4% coupon competitive in a 7% market.",
      excel:"=PV(0.07, 8, 40, 1000)", answer:820.86
    },
    {
      conceptPrompt:"A bond has a 5% coupon. The market&rsquo;s required return (YTM) for similar bonds is also 5%. Without calculating &mdash; premium, discount, or par?",
      correct:"par",
      fb:{
        par:"<b>Correct.</b> Coupon = YTM (5% = 5%), so the bond pays exactly what the market requires &mdash; it prices right at par.",
        premium:"Not quite. A premium needs coupon &gt; YTM; here they&rsquo;re equal.",
        discount:"Not quite. A discount needs coupon &lt; YTM; here they&rsquo;re equal."
      },
      pricePrompt:"Now price it. The bond has 6 years to maturity, a 5% annual coupon, and $1,000 par, at a 5% YTM.",
      h1:"You know it prices at par, so expect exactly $1,000. What are your five inputs?",
      h2:"<code>N = 6</code>, <code>I/YR = 5</code>, <code>PMT = 50</code> (5% &times; $1,000), <code>FV = 1,000</code>, solve for <code>PV</code>.",
      why:"Exactly par &mdash; when the coupon equals the yield, the price equals the $1,000 face value.",
      excel:"=PV(0.05, 6, 50, 1000)", answer:1000.00
    }
  ];

  var N=QUESTIONS.length, current=0;
  var aDone=new Array(N).fill(false), aClean=new Array(N).fill(true);
  var bSolved=new Array(N).fill(false), bClean=new Array(N).fill(false), bAtt=new Array(N).fill(0);
  function fmt(n){ return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function copyText(text, btn){
    var done=function(){ btn.textContent='Copied!'; btn.classList.add('done');
      setTimeout(function(){ btn.textContent='Copy'; btn.classList.remove('done'); },1500); };
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(fb); } else fb();
    function fb(){ var ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
      try{document.execCommand('copy'); done();}catch(e){} document.body.removeChild(ta); }
  }

  function buildDots(){ var d=document.getElementById('dots'); d.innerHTML='';
    for(var k=0;k<N;k++){ var s=document.createElement('span'); s.className='dot'; s.id='dot'+k; d.appendChild(s); } }
  function updateDots(){ for(var k=0;k<N;k++){ var el=document.getElementById('dot'+k); el.className='dot';
      if(bSolved[k]) el.classList.add('solved'); if(k===current) el.classList.add('current'); }
    document.getElementById('counter').textContent='Q'+(current+1)+' of '+N; }

  function pickA(i, key){
    if(aDone[i]) return;
    var card=document.getElementById('q'+i);
    var btns=card.querySelectorAll('.opt');
    btns.forEach(function(b){ b.classList.remove('ok','bad'); });
    var btn=card.querySelector('.opt[data-key="'+key+'"]');
    var ap=card.querySelector('.apanel');
    var correct=(key===QUESTIONS[i].correct);
    ap.innerHTML=QUESTIONS[i].fb[key];
    ap.className='apanel show '+(correct?'ok':'bad');
    if(correct){
      btn.classList.add('ok');
      aDone[i]=true;
      card.querySelector('.pnum.a').classList.add('done');
      btns.forEach(function(b){ b.classList.add('lock'); if(b!==btn) b.classList.add('dim'); });
      var pb=card.querySelector('.partb'); pb.classList.add('show');
      var inp=pb.querySelector('input'); if(inp) setTimeout(function(){ inp.focus(); },60);
    } else {
      btn.classList.add('bad'); aClean[i]=false;
    }
  }

  function showPanel(i,t){ document.querySelector('#q'+i+' .panel.'+t).classList.add('show'); }
  function showNext(i){ var w=document.querySelector('#q'+i+' .nextwrap'); w.classList.add('show');
    w.querySelector('button.next').textContent=(i===N-1)?'See results':'Next question \u2192'; }

  function checkB(i){
    var card=document.getElementById('q'+i), input=card.querySelector('.partb input'), fb=card.querySelector('.partb .feedback');
    var raw=input.value.replace(/[$,\s]/g,'');
    if(raw===''){ fb.className='feedback bad'; fb.textContent='Enter an amount first.'; input.className=''; return; }
    var val=Math.abs(parseFloat(raw));
    if(isNaN(val)){ fb.className='feedback bad'; fb.textContent='That doesn\u2019t look like a number.'; input.className='bad'; return; }
    if(Math.abs(val-QUESTIONS[i].answer)<=1.0){
      fb.className='feedback ok'; fb.textContent='\u2713 Correct \u2014 $'+fmt(QUESTIONS[i].answer);
      input.className='ok'; card.querySelector('.pnum.b').classList.add('done');
      if(!bSolved[i] && bAtt[i]<3) bClean[i]=true;
      bSolved[i]=true; updateDots(); showNext(i);
    } else {
      bAtt[i]++; input.className='bad';
      if(bAtt[i]===1){ showPanel(i,'t1'); fb.className='feedback bad'; fb.textContent='Not quite \u2014 here\u2019s a hint.'; }
      else if(bAtt[i]===2){ showPanel(i,'t2'); fb.className='feedback bad'; fb.textContent='Still off \u2014 try this.'; }
      else { showPanel(i,'reveal'); fb.className='feedback bad'; fb.textContent='Here\u2019s the answer \u2014 enter it to continue.'; }
    }
  }
  function next(i){ document.getElementById('q'+i).classList.remove('active');
    if(i===N-1){ finish(); return; }
    current=i+1; document.getElementById('q'+current).classList.add('active'); updateDots(); }
  function finish(){ var clean=0; for(var k=0;k<N;k++){ if(bClean[k] && aClean[k]) clean++; }
    document.getElementById('score').textContent=clean+' / '+N;
    document.getElementById('note').style.display='none';
    document.getElementById('finish').classList.add('show'); }
  function restart(){ current=0; aDone.fill(false); aClean.fill(true); bSolved.fill(false); bClean.fill(false); bAtt.fill(0);
    document.getElementById('finish').classList.remove('show');
    document.getElementById('note').style.display='';
    render(); updateDots();
    document.getElementById('q0').classList.add('active'); }

  function render(){
    var host=document.getElementById('quiz'); host.innerHTML='';
    QUESTIONS.forEach(function(q,i){
      var card=document.createElement('div'); card.className='q'; card.id='q'+i;
      card.innerHTML=
        '<div class="phead"><div class="pnum a">Q'+(i+1)+' &middot; Part A</div><div class="prompt">'+q.conceptPrompt+'</div></div>'+
        '<div class="options">'+
          '<button class="opt" data-key="premium" onclick="pickA('+i+',\'premium\')">Premium</button>'+
          '<button class="opt" data-key="discount" onclick="pickA('+i+',\'discount\')">Discount</button>'+
          '<button class="opt" data-key="par" onclick="pickA('+i+',\'par\')">Par</button>'+
        '</div>'+
        '<div class="apanel"></div>'+
        '<div class="partb">'+
          '<div class="phead"><div class="pnum b">Part B</div><div class="prompt">'+q.pricePrompt+'</div></div>'+
          '<div class="answer"><span class="pre">Price:</span>'+
            '<input type="text" inputmode="decimal" placeholder="$0.00" onkeydown="if(event.key===\'Enter\')checkB('+i+')">'+
            '<button class="check" onclick="checkB('+i+')">Check</button><span class="feedback"></span></div>'+
          '<div class="panel t1"><span class="tag">Hint 1</span>'+q.h1+'</div>'+
          '<div class="panel t2"><span class="tag">Hint 2 &middot; Map the inputs</span>'+q.h2+'</div>'+
          '<div class="panel reveal"><span class="tag">Answer</span>'+
            '<span class="amt">$'+fmt(q.answer)+'</span><div class="why">'+q.why+'</div>'+
            '<div class="excel"><span class="lab">In Excel:</span><code>'+q.excel+'</code>'+
            '<button class="cbtn" onclick="copyText(\''+q.excel+'\', this)">Copy</button></div></div>'+
          '<div class="nextwrap"><button class="next" onclick="next('+i+')">Next question \u2192</button></div>'+
        '</div>';
      host.appendChild(card);
    });
  }
  buildDots(); render(); document.getElementById('q0').classList.add('active'); updateDots();
</script>
