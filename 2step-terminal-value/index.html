<!-- EYARC-styled graphic — terminal value via Gordon growth -->
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --navy:#002E5D; --blue:#0d65c7; --lightblue:#B5E2FA;
    --yellow:#FFE600; --gold:#F2BA05;
    --gray1:#EAEAF1; --gray2:#C2C2CE; --gray3:#747480;
    --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans:'Open Sans', Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:var(--sans); background:#F2F3F7;
    display:flex; justify-content:center; padding:40px 24px; min-height:100vh; }
  .wrap{ width:100%; max-width:780px; }
  .frame{ border:1px solid #000; border-radius:14px; overflow:hidden; background:var(--navy);
    box-shadow:0 18px 40px -18px rgba(0,46,93,.55); }
  .bar{ padding:16px 22px; background:var(--navy); border-bottom:3px solid var(--yellow);
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .bar h1{ font-weight:800; font-size:16px; letter-spacing:.3px; color:#fff; }
  .bar .step{ font-family:var(--mono); font-size:11px; font-weight:700; color:var(--navy);
    background:var(--yellow); padding:5px 11px; border-radius:6px; white-space:nowrap; }

  .screen{ position:relative; background:var(--navy); padding:22px 24px 24px; }
  .screen::after{ content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 3px);
    pointer-events:none; }
  .eqlabel{ font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color:var(--gray2); margin-bottom:13px; }
  .eq{ font-family:var(--mono); font-weight:500; color:#fff;
    display:flex; align-items:baseline; flex-wrap:wrap; gap:9px; font-size:21px; }
  .eq .lbl{ font-weight:700; color:var(--lightblue); } .eq .lbl sub{ font-size:.55em; font-weight:700; }
  .eq .op{ color:var(--gold); font-weight:700; }
  .eq .res{ color:var(--yellow); font-weight:700; }
  .divider{ height:1px; background:rgba(181,226,250,.18); margin:20px 0; }
  .eqgrid{ display:inline-grid; grid-template-columns:auto 1fr; gap:8px 10px; align-items:baseline;
    font-family:var(--mono); font-size:21px; font-weight:500; color:#fff; }
  .eqgrid .lhs{ text-align:right; font-weight:700; color:var(--lightblue); }
  .eqgrid .lhs sub{ font-size:.55em; font-weight:700; }
  .eqgrid .op{ color:var(--gold); font-weight:700; }
  .eqgrid .res{ color:var(--yellow); font-weight:700; }
  .paren{ color:#fff; }
  .eqsub{ display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;
    font-family:var(--mono); font-size:11.5px; color:var(--lightblue); }
  .eqsub .tag{ background:rgba(181,226,250,.12); padding:2px 8px; border-radius:5px; }
</style>

<div class="wrap">
  <div class="frame">
    <div class="bar">
      <h1>Terminal Value &mdash; Gordon Growth</h1>
      <div class="step">TV&#8323; = D&#8324; &divide; (r &minus; g)</div>
    </div>

    <div class="screen">
      <div class="eqlabel">Step 1 &mdash; First stable-growth dividend (D&#8324;)</div>
      <div class="eq">
        <span class="lbl">D<sub>4</sub></span>
        <span class="op">=</span>
        <span>1.728</span>
        <span class="op">&times;</span>
        <span>1.04</span>
        <span class="op">=</span>
        <span class="res">1.797</span>
      </div>

      <div class="divider"></div>

      <div class="eqlabel">Step 2 &mdash; Terminal value at end of year 3 (TV&#8323;)</div>
      <div class="eqgrid">
        <div class="lhs">TV<sub>3</sub></div>
        <div><span class="op">=</span> 1.797 <span class="op">&divide;</span> <span class="paren">(</span>0.12 <span class="op">&minus;</span> 0.04<span class="paren">)</span></div>
        <div class="lhs"></div>
        <div><span class="op">=</span> 1.797 <span class="op">&divide;</span> 0.08</div>
        <div class="lhs"></div>
        <div><span class="op">=</span> <span class="res">22.46</span></div>
      </div>

      <div class="eqsub">
        <span class="tag">D&#8324; = 1.797&nbsp;&middot;&nbsp;next year&rsquo;s dividend</span>
        <span class="tag">r = 12%</span>
        <span class="tag">g = 4% (stable)</span>
      </div>
    </div>
  </div>
</div>
