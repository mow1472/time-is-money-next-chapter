<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valuing a two-stage dividend stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Open Sans','Segoe UI',Arial,sans-serif;
    background:#EAEAF1;color:#002E5D;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:32px 20px;
  }
  .sheet{
    width:100%;max-width:720px;background:#FFFFFF;
    border:1px solid #C2C2CE;border-radius:12px;
    padding:36px 32px;text-align:center;
  }
  h1{font-size:20px;font-weight:700;margin-bottom:28px}
  .row{
    display:flex;align-items:stretch;justify-content:center;gap:14px;
  }
  .block{
    flex:1 1 0;border-radius:10px;padding:22px 16px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .block .big{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:8px}
  .block .small{font-size:13px;font-weight:400;line-height:1.4}
  .b1{background:#B5E2FA;color:#002E5D}
  .b2{background:#0d65c7;color:#FFFFFF}
  .answer{background:#002E5D;color:#FFFFFF;border-bottom:6px solid #FFE600}
  .answer .small{color:#D7DEE8}
  .op{flex:0 0 auto;align-self:center;font-size:34px;font-weight:700;color:#002E5D}
  @media (max-width:560px){
    .row{flex-direction:column}
    .op{padding:2px 0}
  }
</style>
</head>
<body>
<div class="sheet">
  <h1>To value the stock, add two things</h1>
  <div class="row">
    <div class="block b1">
      <div class="big">Near-term dividends</div>
      <div class="small">what it pays in years 1&ndash;3</div>
    </div>
    <div class="op" aria-hidden="true">+</div>
    <div class="block b2">
      <div class="big">Terminal value</div>
      <div class="small">everything after, as one number</div>
    </div>
    <div class="op" aria-hidden="true">=</div>
    <div class="block answer">
      <div class="big">Price today</div>
      <div class="small">what the stock is worth now</div>
    </div>
  </div>
</div>
</body>
</html>
