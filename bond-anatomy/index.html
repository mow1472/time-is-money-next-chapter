<!-- EYARC-styled graphic — anatomy of a bond (certificate + callouts) -->
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800&display=swap');
  :root{
    --navy:#002E5D; --blue:#0d65c7; --lightblue:#B5E2FA;
    --yellow:#FFE600; --gold:#F2BA05;
    --gray1:#EAEAF1; --gray2:#C2C2CE; --gray3:#747480;
    --sans:'Open Sans', Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:var(--sans); background:#F2F3F7; color:var(--navy);
    display:flex; justify-content:center; padding:40px 24px; min-height:100vh; }
  .wrap{ width:100%; max-width:820px; }
  .frame{ border:1px solid #000; border-radius:14px; overflow:hidden; background:#fff;
    box-shadow:0 18px 40px -18px rgba(0,46,93,.55); }
  .bar{ padding:16px 22px; background:var(--navy); border-bottom:3px solid var(--yellow);
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .bar h1{ font-weight:800; font-size:16px; color:#fff; letter-spacing:.3px; }
  .bar .sub{ font-size:12px; font-weight:600; color:var(--lightblue); }
  .chartwrap{ padding:14px 14px 2px; }
  svg{ width:100%; height:auto; display:block; }

  .co{ height:100%; background:#fff; border:1px solid var(--gray2); border-radius:10px;
    padding:11px 13px; font-family:var(--sans); }
  .co .hd{ display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  .co .bdg{ flex:none; width:22px; height:22px; border-radius:6px; background:var(--navy); color:#fff;
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center; }
  .co .bdg.gold{ background:var(--gold); color:var(--navy); }
  .co .ttl{ font-size:12.5px; font-weight:800; color:var(--navy); line-height:1.15; }
  .co .tx{ font-size:11.5px; line-height:1.5; color:var(--navy); }
  .co .simple{ font-size:11px; line-height:1.45; color:var(--gray3); margin-top:7px; }
  .co .simple b{ color:var(--blue); }

  .iou{ padding:8px 26px 18px; }
  .iou p{ font-size:13px; line-height:1.5; color:var(--gray3); font-weight:300; text-align:center; }
  .iou p b{ font-weight:600; color:var(--gray3); }
</style>

<div class="wrap">
  <div class="frame">
    <div class="bar">
      <h1>Anatomy of a Bond</h1>
      <div class="sub">The four numbers that define it</div>
    </div>

    <div class="chartwrap">
      <svg viewBox="0 0 820 412" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bond certificate with four labeled features">
        <defs>
          <radialGradient id="paper" cx="50%" cy="38%" r="78%">
            <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#F4F7FB"/>
          </radialGradient>
        </defs>

        <!-- certificate -->
        <rect x="250" y="20" width="320" height="372" rx="7" fill="url(#paper)" stroke="#002E5D" stroke-width="2.5"/>
        <rect x="262" y="32" width="296" height="348" rx="3" fill="none" stroke="#F2BA05" stroke-width="1.3"/>
        <g fill="#F2BA05">
          <rect x="265" y="35" width="8" height="8" transform="rotate(45 269 39)"/>
          <rect x="547" y="35" width="8" height="8" transform="rotate(45 551 39)"/>
          <rect x="265" y="369" width="8" height="8" transform="rotate(45 269 373)"/>
          <rect x="547" y="369" width="8" height="8" transform="rotate(45 551 373)"/>
        </g>

        <text x="410" y="60" text-anchor="middle" font-size="19" font-weight="800" fill="#002E5D" letter-spacing="1.5">BOND CERTIFICATE</text>
        <line x1="328" y1="72" x2="492" y2="72" stroke="#F2BA05" stroke-width="1.5"/>
        <text x="410" y="92" text-anchor="middle" font-size="9.5" font-weight="600" fill="#747480" letter-spacing="1">SAMPLE ISSUER, INC.</text>

        <text x="410" y="126" text-anchor="middle" font-size="9" font-weight="800" fill="#747480" letter-spacing="2">PAR VALUE</text>
        <text x="410" y="170" text-anchor="middle" font-size="40" font-weight="800" fill="#002E5D">$1,000</text>

        <line x1="296" y1="202" x2="524" y2="202" stroke="#EAEAF1" stroke-width="1.3"/>

        <text x="345" y="234" text-anchor="middle" font-size="8.5" font-weight="800" fill="#747480" letter-spacing="1.5">COUPON RATE</text>
        <text x="345" y="266" text-anchor="middle" font-size="25" font-weight="800" fill="#002E5D">6%</text>
        <line x1="410" y1="216" x2="410" y2="278" stroke="#EAEAF1" stroke-width="1.3"/>
        <text x="478" y="234" text-anchor="middle" font-size="8.5" font-weight="800" fill="#747480" letter-spacing="1.5">MATURITY</text>
        <text x="478" y="266" text-anchor="middle" font-size="25" font-weight="800" fill="#002E5D">10 yrs</text>

        <circle cx="410" cy="328" r="25" fill="none" stroke="#002E5D" stroke-width="1.8"/>
        <circle cx="410" cy="328" r="19" fill="none" stroke="#F2BA05" stroke-width="1"/>
        <text x="410" y="334" text-anchor="middle" font-size="15" font-weight="800" fill="#002E5D">$</text>
        <line x1="296" y1="366" x2="392" y2="366" stroke="#C2C2CE" stroke-width="1"/>
        <text x="296" y="377" font-size="7.5" fill="#747480">Authorized signature</text>

        <!-- connectors: dots sit beside each value, not over it -->
        <g stroke="#C2C2CE" stroke-width="1.3" fill="none">
          <path d="M238 64 L362 162"/>
          <path d="M238 262 L316 262"/>
          <path d="M582 64 L512 260"/>
          <path d="M582 250 L572 326"/>
        </g>
        <g fill="#0d65c7">
          <circle cx="362" cy="162" r="3.4"/>
          <circle cx="316" cy="262" r="3.4"/>
          <circle cx="512" cy="260" r="3.4"/>
          <circle cx="572" cy="326" r="3.4"/>
        </g>

        <!-- 1 Par (top-left) -->
        <foreignObject x="8" y="28" width="230" height="74">
          <div xmlns="http://www.w3.org/1999/xhtml" class="co">
            <div class="hd"><div class="bdg">1</div><div class="ttl">Par value = $1,000</div></div>
            <div class="tx">What the issuer repays at maturity.</div>
          </div>
        </foreignObject>

        <!-- 2 Coupon (bottom-left) -->
        <foreignObject x="8" y="168" width="230" height="196">
          <div xmlns="http://www.w3.org/1999/xhtml" class="co">
            <div class="hd"><div class="bdg">2</div><div class="ttl">Coupon rate = 6%</div></div>
            <div class="tx">The annual interest a bond pays, based on its face value. Here, $1,000 &times; 6% = <b>$60 of interest each year</b> &mdash; typically two $30 payments.</div>
            <div class="simple"><b>In simple terms:</b> how much interest the issuer promises to pay each year, as a percentage of face value.</div>
          </div>
        </foreignObject>

        <!-- 3 Maturity (top-right) -->
        <foreignObject x="582" y="28" width="230" height="74">
          <div xmlns="http://www.w3.org/1999/xhtml" class="co">
            <div class="hd"><div class="bdg">3</div><div class="ttl">Maturity = 10 years</div></div>
            <div class="tx">When par is repaid and the bond ends.</div>
          </div>
        </foreignObject>

        <!-- 4 YTM (bottom-right) -->
        <foreignObject x="582" y="150" width="230" height="214">
          <div xmlns="http://www.w3.org/1999/xhtml" class="co">
            <div class="hd"><div class="bdg gold">4</div><div class="ttl">Yield to maturity (YTM)</div></div>
            <div class="tx">The total annual return you can expect if you buy the bond today and hold it until it matures.</div>
            <div class="simple"><b>In simple terms:</b> it folds in all the bond&rsquo;s cash flows &mdash; the coupon payments, the par you get at maturity, and the price you pay today &mdash; into one overall rate of return. Often called the bond&rsquo;s &ldquo;true&rdquo; return if held to maturity.</div>
          </div>
        </foreignObject>
      </svg>
    </div>

    <div class="iou">
      <p>Think of a bond as <b>an IOU you buy</b>: you lend money now and get paid interest along the way, then your money back at the end.</p>
    </div>
  </div>
</div>
