<!-- EYARC-styled graphic — multi-year dividend growth (20%) -->
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --navy:#002E5D; --blue:#0d65c7; --lightblue:#B5E2FA;
    --yellow:#FFE600; --gold:#F2BA05;
    --gray1:#EAEAF1; --gray2:#C2C2CE; --gray3:#747480;
    --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --sans:'Open Sans', Arial, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:var(--sans); background:#F2F3F7;
    display:flex; justify-content:center; padding:40px 24px; min-height:100vh; }
  .wrap{ width:100%; max-width:780px; }
  .frame{ border:1px solid #000; border-radius:14px; overflow:hidden; background:var(--navy);
    box-shadow:0 18px 40px -18px rgba(0,46,93,.55); }
  .bar{ padding:16px 22px; background:var(--navy); border-bottom:3px solid var(--yellow);
    display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
  .bar h1{ font-weight:800; font-size:16px; letter-spacing:.3px; color:#fff; }
  .bar .step{ font-family:var(--mono); font-size:11px; font-weight:700; color:var(--navy);
    background:var(--yellow); padding:5px 11px; border-radius:6px; white-space:nowrap; }

  .screen{ position:relative; background:var(--navy); padding:24px 24px 26px; }
  .screen::after{ content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 3px);
    pointer-events:none; }
  .eqlabel{ font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color:var(--gray2); margin-bottom:16px; }
  .eqgrid{ display:inline-grid; grid-template-columns:auto auto auto auto auto auto auto; gap:14px 10px;
    align-items:baseline; font-family:var(--mono); font-size:21px; font-weight:500; color:#fff; }
  .eqgrid .lbl{ font-weight:700; color:var(--lightblue); }
  .eqgrid .lbl sub{ font-size:.55em; font-weight:700; }
  .eqgrid .op{ color:var(--gold); font-weight:700; }
  .eqgrid .res{ color:var(--yellow); font-weight:700; text-align:right; }
  .eqgrid > div{ opacity:0; transform:translateY(6px); animation:reveal .42s ease forwards; }
  .eqgrid .r1{ animation-delay:.12s; } .eqgrid .r2{ animation-delay:.32s; } .eqgrid .r3{ animation-delay:.52s; }
  @keyframes reveal{ to{opacity:1; transform:translateY(0);} }

  .eqsub{ display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;
    font-family:var(--mono); font-size:11.5px; color:var(--lightblue); }
  .eqsub .tag{ background:rgba(181,226,250,.12); padding:2px 8px; border-radius:5px; }
</style>

<div class="wrap">
  <div class="frame">
    <div class="bar">
      <h1>Dividend Growth &mdash; 20% per Year</h1>
      <div class="step">D&#8348; = D&#8348;&#8331;&#8321; &times; (1 + g)</div>
    </div>

    <div class="screen">
      <div class="eqlabel">Grow the dividend three years at g = 20%</div>
      <div class="eqgrid">
        <div class="lbl r1">D<sub>1</sub></div><div class="op r1">=</div><div class="r1">1.00</div><div class="op r1">&times;</div><div class="r1">1.20</div><div class="op r1">=</div><div class="res r1">1.200</div>
        <div class="lbl r2">D<sub>2</sub></div><div class="op r2">=</div><div class="r2">1.20</div><div class="op r2">&times;</div><div class="r2">1.20</div><div class="op r2">=</div><div class="res r2">1.440</div>
        <div class="lbl r3">D<sub>3</sub></div><div class="op r3">=</div><div class="r3">1.44</div><div class="op r3">&times;</div><div class="r3">1.20</div><div class="op r3">=</div><div class="res r3">1.728</div>
      </div>
      <div class="eqsub">
        <span class="tag">D&#8320; = $1.00&nbsp;&middot;&nbsp;starting dividend</span>
        <span class="tag">g = 20% each year</span>
      </div>
    </div>
  </div>
</div>
